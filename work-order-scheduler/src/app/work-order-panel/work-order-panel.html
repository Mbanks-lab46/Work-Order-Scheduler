@if (open()) {
  <div class="overlay" (click)="close.emit()"></div>

  <aside class="panel" (click)="$event.stopPropagation()">
        <div class="panel-head">
            <div class="panel-head-copy">
                <div class="panel-title">Work Order Details</div>
                <div class="panel-subtitle">Specify the dates, name and status for this order</div>
            </div>
        <div class="panel-head-actions">
                <button type="button" class="btn ghost" (click)="close.emit()">Cancel</button>
                <button type="button" class="btn primary create-btn" (click)="onSubmit()">
                {{ mode() === 'create' ? 'Create' : 'Save' }}
                </button>
        </div>
        </div>

        <form class="panel-form" [formGroup]="form" (ngSubmit)="onSubmit()">
            <label class="field">
                <div class="field-label">Work Order Name</div>
                <input class="input" formControlName="name" placeholder="Enter name" />
                @if (form.controls['name'].touched && form.controls['name'].invalid) {
                <div class="field-error">Required.</div>
                }
            </label>

            <label class="field">
                    <div class="field-label">Status</div>
                    <ng-select
                    [items]="statusOptions()"
                    class="status-select"
                    bindLabel="label"
                    bindValue="value"
                    [clearable]="false"
                    [searchable]="false"
                    formControlName="status">

                        <ng-template ng-label-tmp let-item="item">
                            <span class="status-pill" [ngClass]="'status-' + item.value">
                                {{ item.label }}
                            </span>
                        </ng-template> 

                        <ng-template ng-option-tmp let-item="item">
                            <span class="inner-dropdown">
                                {{ item.label }}
                            </span>
                        </ng-template>

                    </ng-select>            
            </label>

            <div class="field two">
                <div class="col">
                    <div class="form-label">End Date</div>
                    <input
                        type="text"
                        class="form-control"
                        ngbDatepicker
                        #endDate="ngbDatepicker"
                        formControlName="endDate"
                        (click)="endDate.toggle()"/>
                </div>
                <div class="col">
                    <div class="form-label">Start Date</div>
                    <input
                        type="text"
                        class="form-control"
                        ngbDatepicker
                        #startDate="ngbDatepicker"
                        formControlName="startDate"
                        (click)="startDate.toggle()"
                        />
                </div>    
            </div>

            @if (error()) {
                <div class="banner-error">{{ error() }}</div>
            }

        
        </form>
  </aside>
}
